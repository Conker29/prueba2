name: vacunacion_app
description: Sistema de gestión de campañas de vacunación
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # Estado
  provider: ^6.1.2

  # Cámara y GPS
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Persistencia local (offline)
  sqflite: ^2.3.2
  path: ^1.9.0
  connectivity_plus: ^6.0.1

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.3.3
  fl_chart: ^0.66.2
  supabase_flutter: ^2.14.2

dev_dependencies:
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true